<svg viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"><rect x="0" y="0" width="760" height="330" rx="18" fill="#0E1118" stroke="#2A3040" stroke-width="1"/><text x="380.0" y="42" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" fill="#E9ECF3" text-anchor="middle" font-weight="700" letter-spacing="0">A Lightning Address is just LNURL-pay with a friendly name</text><rect x="80" y="92" width="600" height="52" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><text x="100" y="124" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13.5" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">alice@example.com</text><text x="662" y="124" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">what you type</text><line x1="380.0" y1="144" x2="380.0" y2="172" stroke="#9D8BFF" stroke-width="2"/><path d="M380.0 178 l-4 -6 l8 0 z" fill="#9D8BFF"/><rect x="80" y="178" width="600" height="52" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><text x="100" y="210" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13.5" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">GET https://example.com/.well-known/lnurlp/alice</text><text x="662" y="210" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">the wallet rewrites it</text><line x1="380.0" y1="230" x2="380.0" y2="258" stroke="#9D8BFF" stroke-width="2"/><path d="M380.0 264 l-4 -6 l8 0 z" fill="#9D8BFF"/><rect x="80" y="264" width="600" height="52" rx="11" fill="#161B26" stroke="#F7931A" stroke-width="1.2"/><text x="100" y="296" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="13.5" fill="#F7931A" text-anchor="start" font-weight="500" letter-spacing="0">{ tag: payRequest, callback, metadata }</text><text x="662" y="296" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">ordinary LNURL-pay from here</text></svg>