<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif"><rect x="0" y="0" width="760" height="430" rx="18" fill="#0E1118" stroke="#2A3040" stroke-width="1"/><text x="380.0" y="42" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#E9ECF3" text-anchor="middle" font-weight="700" letter-spacing="0">What is inside a Lightning QR</text><text x="380.0" y="64" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="middle" font-weight="400" letter-spacing="0">five of six layers are plain web. Bitcoin is only the orange one.</text><rect x="100" y="90" width="560" height="44" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><rect x="100" y="90" width="4" height="44" rx="2" fill="#9D8BFF"/><text x="122" y="117" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">QR code</text><text x="642" y="117" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">you scan this</text><rect x="100" y="145" width="560" height="44" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><rect x="100" y="145" width="4" height="44" rx="2" fill="#9D8BFF"/><text x="122" y="172" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">lnurl1…  bech32 text</text><text x="642" y="172" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">just an encoding</text><rect x="100" y="200" width="560" height="44" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><rect x="100" y="200" width="4" height="44" rx="2" fill="#9D8BFF"/><text x="122" y="227" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">https://server/…</text><text x="642" y="227" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">a URL you call</text><rect x="100" y="255" width="560" height="44" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><rect x="100" y="255" width="4" height="44" rx="2" fill="#9D8BFF"/><text x="122" y="282" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">JSON over HTTP  (payRequest)</text><text x="642" y="282" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">the normal web</text><rect x="100" y="310" width="560" height="44" rx="11" fill="#241a10" stroke="#F7931A" stroke-width="1.2"/><rect x="100" y="310" width="4" height="44" rx="2" fill="#F7931A"/><text x="122" y="337" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#F7931A" text-anchor="start" font-weight="500" letter-spacing="0">bolt11 invoice</text><text x="642" y="337" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">the only Bitcoin here</text><rect x="100" y="365" width="560" height="44" rx="11" fill="#161B26" stroke="#2A3040" stroke-width="1"/><rect x="100" y="365" width="4" height="44" rx="2" fill="#8B90A0"/><text x="122" y="392" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="15" fill="#E9ECF3" text-anchor="start" font-weight="500" letter-spacing="0">Lightning settles</text><text x="642" y="392" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12.5" fill="#8B90A0" text-anchor="end" font-weight="400" letter-spacing="0">money actually moves</text></svg>