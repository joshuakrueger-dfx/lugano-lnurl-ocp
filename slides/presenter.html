<style>
:root{--bg:#0B0D12;--bg2:#11141C;--card:#161A24;--line:#232838;--btc:#F7931A;--net:#9D8BFF;
  --txt:#EAECF2;--mut:#8B90A3;--dim:#5B6072;--ok:#34D399}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
code{font-family:'JetBrains Mono',monospace;background:#1c2130;padding:1px 6px;border-radius:5px;font-size:.9em;color:#cfd5e6}
.wrap{max-width:1000px;margin:0 auto;padding:30px 26px 130px}

.topbar{position:sticky;top:0;z-index:10;background:rgba(11,13,18,.94);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line)}
.topbar .lhs{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .lhs b{color:var(--net)}
.hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 30px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--btc)}
.card h2{font-size:clamp(22px,5vw,36px);line-height:1.15;margin:8px 0 4px}
.block{margin-top:20px;border-radius:12px;padding:16px 18px;background:var(--bg2);border:1px solid var(--line)}
.block .h{display:flex;align-items:center;gap:9px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
.outcome{border-color:#26402f;background:rgba(52,211,153,.06)}
.outcome .h{color:var(--ok)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lang{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:6px;letter-spacing:.08em}
.say{font-size:clamp(16px,2.2vw,20px);line-height:1.62;color:var(--txt)}
.outcome .say{font-size:clamp(14px,2vw,17px);color:#cfe9dd}
.peek{margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--dim)}
.peek b{color:var(--net)}

/* bottom nav, thumb friendly */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;gap:10px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(11,13,18,.94);backdrop-filter:blur(8px);border-top:1px solid var(--line)}
.bottomnav button{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--line);color:#fff;
  padding:14px 0;border-radius:12px;cursor:pointer;font-size:18px;font-family:'Space Grotesk',sans-serif}
.bottomnav button:active{background:rgba(255,255,255,.18)}
.bottomnav .ctr{flex:none;min-width:70px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--mut)}

@media(max-width:720px){
  .two{grid-template-columns:1fr}
  .wrap{padding:18px 14px 120px}
  .card{padding:20px 18px;border-radius:14px}
  .hint{display:none}
}

@media print{
  body{background:#fff;color:#111}
  .topbar,.bottomnav,.peek{display:none}
  .wrap{max-width:none;padding:0}
  .card{display:block!important;page-break-after:always;border:none;border-radius:0;padding:22px 8px;background:#fff;color:#111}
  .card h2{color:#111}.block{background:#f4f5f8;border:1px solid #ddd}
  .say,.outcome .say{color:#111}.eyebrow{color:#b76b00}.outcome .h{color:#1a7a52}
}
</style>

<script id="data" type="application/json">
[
{"t":"Title","oEN":"Intrigued by the paradox; they know it is hands-on, not a lecture.","oDE":"Vom Paradox angefixt; sie wissen, es ist hands-on, kein Vortrag.",
"sEN":"Okay, welcome. That title isn't a typo, it's basically the whole point of today. Over the next ninety minutes you're going to build a little Lightning payment server yourself, use it to lie to a wallet, and then work out whether all of this is actually clever or actually a problem. So, not a lecture. Get your laptops and phones out.",
"sDE":"Okay, willkommen. Der Titel ist kein Tippfehler, das ist eigentlich der ganze Punkt heute. In den nächsten neunzig Minuten baut ihr selber einen kleinen Lightning-Zahlungsserver, belügt damit eine Wallet, und findet dann raus, ob das alles wirklich clever ist oder eher ein Problem. Also kein Vortrag. Packt Laptops und Handys aus."},

{"t":"Where is the Bitcoin?","oEN":"Plant the one question of the talk; scanning is just HTTP.","oDE":"Die zentrale Frage setzen; Scannen ist nur HTTP.",
"sEN":"Quick show of hands, who's paid with a Lightning QR before? Right, most of you. Here's the thing nobody really tells you: that QR code is just a URL. You scan it, and your phone makes an HTTP request to some server. No signature, nothing on-chain, not at this point. So keep one question in your head for the next ninety minutes. Where's the actual Bitcoin in any of this?",
"sDE":"Kurzes Handzeichen, wer hat schon mal mit einem Lightning-QR bezahlt? Genau, die meisten. Und jetzt das, was einem keiner so richtig sagt: dieser QR-Code ist einfach eine URL. Ihr scannt ihn, und euer Handy schickt einen HTTP-Request an irgendeinen Server. Keine Signatur, nichts auf der Chain, an der Stelle noch nicht. Behaltet also eine Frage im Kopf, die nächsten neunzig Minuten. Wo ist hier eigentlich das echte Bitcoin?"},

{"t":"What is inside a Lightning QR","oEN":"They see Bitcoin is one thin layer and the rest is plain web.","oDE":"Sie sehen: Bitcoin ist eine dünne Schicht, der Rest ist Web.",
"sEN":"This is basically the whole thing on one slide. Start at the top. You've got a QR code. Inside it is some bech32 text. That decodes to a URL. You call that URL over HTTP. Back comes JSON. Five layers, and every single one is just normal web. The Bitcoin part, the actual invoice, is this one orange line down here. So everything that feels like Lightning to you is really happening up in the web layers.",
"sDE":"Das ist im Grunde das Ganze auf einer Folie. Fangt oben an. Ihr habt einen QR-Code. Da drin steckt bech32-Text. Der wird zu einer URL. Die ruft ihr über HTTP auf. Zurück kommt JSON. Fünf Schichten, und jede einzelne ist einfach nur normales Web. Der Bitcoin-Teil, die eigentliche Invoice, ist diese eine orange Zeile hier unten. Alles, was sich für euch nach Lightning anfühlt, passiert eigentlich oben in den Web-Schichten."},

{"t":"The idea behind the next 90 minutes","oEN":"State the argument they will judge by the end.","oDE":"Das Argument benennen, das sie am Ende beurteilen.",
"sEN":"So here's what I'm actually claiming. The thing that made Lightning usable isn't really Bitcoin, it's web tech, and along the way it quietly put trust back into a server. OpenCryptoPay then takes that exact same move and runs with it, to any coin on any chain. And your job today is to understand exactly what it solves, what it asks you to trust, and the one open problem worth building on.",
"sDE":"Also was ich eigentlich behaupte: das, was Lightning benutzbar gemacht hat, ist gar nicht so richtig Bitcoin, sondern Web-Technik, und dabei ist ganz leise wieder Vertrauen in einen Server gewandert. OpenCryptoPay nimmt genau diesen Move und zieht ihn durch, auf jede Coin, jede Chain. Und eure Aufgabe heute ist, genau zu verstehen, was es löst, was es euch abverlangt zu vertrauen, und das eine offene Problem, auf dem sich bauen lässt."},

{"t":"Lightning, in one slide","oEN":"Refresh the baseline and name the gap LNURL fills.","oDE":"Basis auffrischen und die Lücke benennen, die LNURL füllt.",
"sEN":"Thirty seconds of recap, because you know this already. Lightning is fast, cheap payments over channels. A payment is just an invoice that the person getting paid signs. The annoying part is they have to make a brand new invoice every single time. No fixed address you can reuse, no clean here-pay-me link. And that one annoyance is the reason everything nice you've ever used had to be built on top of it.",
"sDE":"Dreißig Sekunden Wiederholung, ihr kennt das eh. Lightning sind schnelle, billige Zahlungen über Channels. Eine Zahlung ist einfach eine Invoice, die der signiert, der das Geld kriegt. Das Nervige: er muss jedes einzelne Mal eine komplett neue Invoice machen. Keine feste Adresse zum Wiederverwenden, kein sauberer Hier-zahl-mir-Link. Und genau dieses eine Ärgernis ist der Grund, warum alles Schöne, das ihr je benutzt habt, obendrauf gebaut werden musste."},

{"t":"That bolt-on layer is LNURL","oEN":"Follow the concrete two-round-trip flow.","oDE":"Den konkreten Zwei-Round-Trip-Ablauf verstehen.",
"sEN":"LNURL is what fixes that. The QR is just bech32 of an https URL. Follow the arrows: your wallet does a GET on the pay endpoint, the server sends back this payRequest with a callback and some metadata. Then the wallet hits the callback with an amount, and the server finally hands over the bolt11 invoice. Two HTTP requests, and notice, the Bitcoin only turns up in that very last reply.",
"sDE":"LNURL ist das, was das löst. Der QR ist nur bech32 von einer https-URL. Folgt den Pfeilen: eure Wallet macht ein GET auf den Pay-Endpoint, der Server schickt diesen payRequest zurück, mit einem Callback und ein bisschen Metadaten. Dann ruft die Wallet den Callback mit einem Betrag auf, und der Server rückt endlich die bolt11-Invoice raus. Zwei HTTP-Requests, und seht ihr, das Bitcoin taucht erst in der allerletzten Antwort auf."},

{"t":"One pattern, four jobs","oEN":"Map the LNURL family; pay is today's focus.","oDE":"Die LNURL-Familie einordnen; pay ist der Fokus.",
"sEN":"Same idea, four different uses. Pay is the one we'll build, your reusable send-me-money link. Withdraw is the opposite, you scan to pull money in. Auth lets you log in with no password, just a signature. And channel opens a channel for you automatically. Oh, and a Lightning Address, that name-at-domain thing, is honestly just a nicer name for an LNURL-pay link. We're sticking with pay.",
"sDE":"Gleiche Idee, vier verschiedene Anwendungen. Pay bauen wir gleich, euer wiederverwendbarer Schick-mir-Geld-Link. Withdraw ist das Gegenteil, ihr scannt, um Geld reinzuziehen. Auth lässt euch ohne Passwort einloggen, nur mit einer Signatur. Und channel macht euch automatisch einen Channel auf. Ach, und eine Lightning Address, dieses Name-at-Domain, ist ehrlich gesagt nur ein hübscherer Name für einen LNURL-pay-Link. Wir bleiben bei pay."},

{"t":"The friendly name: Lightning Address","oEN":"They see a Lightning Address is just a human label that resolves to an LNURL-pay URL — no new protocol.","oDE":"Sie sehen: eine Lightning Address ist nur ein menschliches Etikett, das zu einer LNURL-pay-URL auflöst — kein neues Protokoll.",
"sEN":"Quick one before we build. You've all seen these name-at-domain addresses, like coffee-at-some-shop. It looks like email, on purpose. But it's nothing new under the hood: the wallet just rewrites it to https-host-slash-well-known-slash-lnurlp-slash-coffee, fires one HTTPS request, gets back the payRequest, asks for the amount, gets a bolt11, pays. Four steps, all web. So name-at-domain is just a friendly label sitting on top of the exact LNURL-pay flow you're about to build by hand. Nothing on-chain here either.",
"sDE":"Kurz, bevor wir bauen. Ihr habt alle diese Name-at-Domain-Adressen gesehen, sowas wie coffee-at-irgendein-Shop. Sieht aus wie E-Mail, absichtlich. Aber darunter ist nichts Neues: die Wallet schreibt das einfach um zu https-Host-slash-well-known-slash-lnurlp-slash-coffee, schickt einen HTTPS-Request, kriegt den payRequest, fragt den Betrag ab, bekommt eine bolt11, zahlt. Vier Schritte, alles Web. Name-at-Domain ist also nur ein hübsches Etikett auf genau dem LNURL-pay-Flow, den ihr gleich von Hand baut. Auch hier nichts auf der Chain."},

{"t":"Now build it","oEN":"FACILITATION: you demo the dfx.shop test-product purchase live; students watch. ~2-3 min.","oDE":"MODERATION: du kaufst das dfx.shop-Testprodukt live vor; Studenten schauen zu. ~2-3 Min.",
"sEN":"Alright, slides away, let's actually do something. Warm-up is on me: I scan this QR, it opens the dfx.shop checkout with a one-cent test product, I confirm, and OpenCryptoPay settles it in seconds. That's a real merchant, real money, real OCP — the thing we spend the next hour taking apart. Scan along on your phone if you like, you don't have to pay. Then open a terminal and we'll jump into the lab sheet.",
"sDE":"Gut, Folien weg, lass uns was machen. Das Warm-up übernehme ich: ich scanne diesen QR, der öffnet die dfx.shop-Kasse mit einem Ein-Cent-Testprodukt, ich bestätige, und OpenCryptoPay wickelt es in Sekunden ab. Echter Merchant, echtes Geld, echtes OCP — genau das, was wir die nächste Stunde auseinandernehmen. Scannt ruhig mit auf eurem Handy, zahlen müsst ihr nicht. Dann macht ein Terminal auf und wir springen ins Lab-Sheet."},

{"t":"It is only a URL","oEN":"They get QR equals URL — and that a Lightning Address is just that URL with a friendly name — by resolving one on their own server.","oDE":"Begreifen: QR ist eine URL — und eine Lightning Address nur derselbe URL mit hübschem Namen, durch Auflösen auf dem eigenen Server.",
"sEN":"Run the first command on the sheet. You take this scary-looking lnurl1 string, throw it at the client, and out comes a completely normal https URL. That's all it is. The big mystery of LNURL is just bech32 wrapped around a link. The QR is a URL. Still zero Bitcoin at this point. Now look at what that URL actually is, a slash-well-known-slash-lnurlp-slash-coffee path. That is exactly what a Lightning Address resolves to. Type coffee-at-your-host into any wallet and it just fetches this. So prove it yourselves, start your merchant and curl your own well-known path. The same payRequest comes back. You just gave a seventy-line server a Lightning Address. Name-at-domain is a label, nothing more.",
"sDE":"Führt den ersten Befehl auf dem Sheet aus. Ihr nehmt diesen furchteinflößenden lnurl1-String, werft ihn dem Client hin, und raus kommt eine völlig normale https-URL. Mehr ist das nicht. Das große Geheimnis von LNURL ist nur bech32, um einen Link gewickelt. Der QR ist eine URL. Immer noch null Bitcoin an der Stelle. Und jetzt schaut, was diese URL eigentlich ist, ein well-known-lnurlp-coffee-Pfad. Genau das löst eine Lightning Address auf. Tippt coffee-at-eurem-Host in irgendeine Wallet, und sie holt genau das. Beweist es selbst, startet euren Merchant und curlt euren eigenen well-known-Pfad. Derselbe payRequest kommt zurück. Ihr habt einem 70-Zeilen-Server gerade eine Lightning Address gegeben. Name-at-Domain ist ein Etikett, mehr nicht."},

{"t":"Become the merchant","oEN":"Each pair runs their own LNURL-pay server and sees the wire format.","oDE":"Jedes Paar fährt den eigenen Server und sieht das Wire-Format.",
"sEN":"Now you're the server. Fire up lnurl_merchant.py and curl the pay endpoint. That little blob of JSON? That's the entire merchant side of LNURL-pay. Seventy lines of Python and it's speaking fluent Lightning. Change the text in the metadata, restart it, curl it again, and you can make a wallet show whatever you want. Let that sink in for a second, because it's about to get interesting.",
"sDE":"Jetzt seid ihr der Server. Startet lnurl_merchant.py und curlt den Pay-Endpoint. Dieser kleine JSON-Klumpen? Das ist die komplette Händlerseite von LNURL-pay. Siebzig Zeilen Python, und das Ding spricht fließend Lightning. Ändert den Text in den Metadaten, startet neu, curlt nochmal, und ihr könnt eine Wallet anzeigen lassen, was ihr wollt. Lasst das mal kurz sacken, denn gleich wird's spannend."},

{"t":"So what stops you from lying?","oEN":"Provoke the attack; they run spoof mode themselves.","oDE":"Den Angriff provozieren; sie starten Spoof selbst.",
"sEN":"So if you're the one deciding what the screen says, what's stopping you from showing coffee for 21 sats but taking more? Let's find out, and we'll do it twice. First the loud way: run the merchant with the spoof flag, it bills a thousand times the amount. Then the sneaky way, spoof swap: it keeps the price at exactly 21 sats but binds the invoice to something else entirely. Keep an eye on which check catches which. The only thing between that honest little screen and a malicious invoice is one check, and it's on the wallet to do it.",
"sDE":"Wenn ihr entscheidet, was auf dem Screen steht, was hält euch davon ab, Kaffee für 21 Sats anzuzeigen, aber mehr zu nehmen? Finden wir's raus, und zwar zweimal. Erst der laute Weg: Merchant mit dem Spoof-Flag, der bucht das Tausendfache ab. Dann der subtile, Spoof swap: der lässt den Preis bei exakt 21 Sats, bindet die Invoice aber an etwas ganz anderes. Achtet drauf, welche Prüfung welchen Angriff fängt. Das Einzige zwischen diesem ehrlichen Screen und einer bösartigen Invoice ist eine einzige Prüfung, und die muss die Wallet machen."},

{"t":"The wallet has to catch it","oEN":"They watch the client detect the lie, then ask what it checked.","oDE":"Sie sehen den Client die Lüge fangen und fragen, was er prüfte.",
"sEN":"Run the client against all three. Honest: amounts line up, hashes line up, PASS. Loud spoof: the amount's a thousand times bigger, ATTACK DETECTED, easy, the amount check alone nailed it. Now the interesting one, the swap: the amount is perfect, 21 sats, the amount check is happy, and it STILL says ATTACK DETECTED, because only the description_hash gives it away. That's the whole point, and it raises the obvious question, what did that hash check actually do?",
"sDE":"Lasst den Client gegen alle drei laufen. Ehrlich: Beträge passen, Hashes passen, PASS. Lauter Spoof: Betrag tausendmal größer, ATTACK DETECTED, einfach, das fängt schon die Betragsprüfung. Jetzt der spannende, der Swap: Betrag perfekt, 21 Sats, die Betragsprüfung ist zufrieden, und trotzdem sagt er ATTACK DETECTED, weil ihn nur der description_hash verrät. Genau das ist der Punkt, und es wirft die naheliegende Frage auf: was hat diese Hash-Prüfung eigentlich gemacht?"},

{"t":"The defence: the hash binding (LUD-06)","oEN":"They get the binding AND that the check lives in the client.","oDE":"Sie verstehen das Binding UND dass die Prüfung im Client liegt.",
"sEN":"This is the bit that matters, and the swap you just ran is the cleanest example of it. The invoice carries a description_hash, and a wallet doing its job checks it matches the sha256 of the metadata it showed you. Honest, they're equal. Swap, the price was honest but the hashes differ, so you bail, and nothing else would have caught it. That's the power of the binding. But here's the catch: the rule is in the protocol, the check runs in the wallet. The blockchain enforces none of it. And yeah, some wallets have shipped without it.",
"sDE":"Das ist der Teil, auf den es ankommt, und der Swap von eben ist das sauberste Beispiel dafür. Die Invoice bringt einen description_hash mit, und eine Wallet, die ihren Job macht, prüft, ob der zum sha256 der gezeigten Metadaten passt. Ehrlich: gleich. Swap: der Preis war ehrlich, aber die Hashes unterscheiden sich, also brecht ihr ab, und nichts anderes hätte das gefangen. Das ist die Stärke der Bindung. Aber der Haken: die Regel steht im Protokoll, die Prüfung passiert in der Wallet. Die Blockchain erzwingt davon nichts. Und ja, es gab Wallets, die das einfach weggelassen haben."},

{"t":"What Bitcoin removed, LNURL brought back","oEN":"Name the cost: a server, a watcher, an optional guard.","oDE":"Den Preis benennen: Server, Beobachter, optionaler Schutz.",
"sEN":"Let's zoom out for a sec. What did Bitcoin take away that LNURL just quietly put back? A server, that you have to reach and trust to be honest. Someone who can watch every payment you make, who, how much, when, so much for privacy. And a safety check that's optional and lives in the client, we didn't even bother verifying the invoice signature today. I'm not saying that's bad. It's a trade. You're paying for good UX with trust. Hang on to that for the red team in a bit.",
"sDE":"Lass uns kurz rauszoomen. Was hat Bitcoin weggenommen, das LNURL einfach wieder reingeholt hat? Einen Server, den ihr erreichen und dem ihr vertrauen müsst, dass er ehrlich ist. Jemanden, der jede Zahlung mitlesen kann, wer, wie viel, wann, so viel zum Thema Privatsphäre. Und eine Schutzprüfung, die optional ist und im Client sitzt, wir haben heute nicht mal die Signatur der Invoice geprüft. Ich sag nicht, dass das schlecht ist. Es ist ein Tausch. Ihr bezahlt gute UX mit Vertrauen. Haltet das fest fürs Red Team gleich."},

{"t":"OpenCryptoPay","oEN":"Bridge cleanly from LNURL to the DFX standard.","oDE":"Sauber von LNURL zum DFX-Standard überleiten.",
"sEN":"Okay, now the DFX piece. OpenCryptoPay is an open standard, and it takes this exact same payRequest we just built and stretches it, from a single Lightning invoice to a whole menu of different coins on different chains.",
"sDE":"Okay, jetzt der DFX-Teil. OpenCryptoPay ist ein offener Standard, und der nimmt genau diesen payRequest, den wir gerade gebaut haben, und dehnt ihn aus, von einer einzelnen Lightning-Invoice zu einem ganzen Menü aus verschiedenen Coins auf verschiedenen Chains."},

{"t":"One QR, many ways to pay","oEN":"Show the concrete extension: the transferAmounts array.","oDE":"Die konkrete Erweiterung zeigen: transferAmounts.",
"sEN":"Back to your keyboards for thirty seconds. Same merchant, add the ocp flag, curl it. Same tag, payRequest, but now there's this transferAmounts array. Pay with Lightning in BTC, or Ethereum in USDT, or Polygon in USDC, all for the same coffee. You didn't learn a new protocol, you added one field. The wallet just gets handed a list of ways to pay.",
"sDE":"Nochmal kurz an die Tastatur. Gleicher Merchant, ocp-Flag dran, curlen. Gleicher Tag, payRequest, aber jetzt gibt's dieses transferAmounts-Array. Zahl mit Lightning in BTC, oder Ethereum in USDT, oder Polygon in USDC, alles für denselben Kaffee. Ihr habt kein neues Protokoll gelernt, ihr habt ein Feld ergänzt. Die Wallet kriegt einfach eine Liste an Zahlwegen hingelegt."},

{"t":"The wallet shows a menu","oEN":"Make multi-asset tangible and explain backward compatibility.","oDE":"Multi-Asset greifbar machen, Abwärtskompatibilität erklären.",
"sEN":"From the user's side it's just a menu: pay with Lightning, or USDT, or USDC, pick one. And here's the neat trick, an old wallet that only knows Lightning just ignores everything else and grabs the top option. They built it to stay backward compatible on purpose.",
"sDE":"Aus Nutzersicht ist es nur ein Menü: zahl mit Lightning, oder USDT, oder USDC, such dir was aus. Und jetzt der nette Trick: eine alte Wallet, die nur Lightning kann, ignoriert den Rest einfach und nimmt die oberste Option. Das haben sie absichtlich abwärtskompatibel gebaut."},

{"t":"What binds the price?","oEN":"Show the open rate question as a builder challenge.","oDE":"Die offene Rate-Frage als Builder-Challenge zeigen.",
"sEN":"Here's the open question, and you can see it in ten seconds. Remember, the hash locked down the description. So what locks down the price? Change USDT to ninety-nine in your transferAmounts, restart, curl again, and the quote just changes. Today the operator quotes that rate, the way every exchange does, and across chains there's no single hash holding it together yet. Binding it trustlessly is the open frontier, and exactly the kind of thing you could build. Bring it to the red team.",
"sDE":"Hier ist die offene Frage, und ihr seht sie in zehn Sekunden. Denkt dran, der Hash hat die Beschreibung festgenagelt. Was nagelt den Preis fest? Setzt USDT auf neunundneunzig in eurem transferAmounts, neu starten, nochmal curlen, und der Kurs ändert sich einfach. Heute quotet der Betreiber diesen Kurs, so wie jede Börse das tut, und über die Chains hinweg gibt's noch keinen einzelnen Hash, der das zusammenhält. Das trustless zu binden ist die offene Frontier, und genau das, was ihr bauen könntet. Nehmt's mit ins Red Team."},

{"t":"SPAR Switzerland","oEN":"Ground it in a real rollout and name why it works.","oDE":"In echtem Rollout erden und benennen, warum es funktioniert.",
"sEN":"And this is real, it's running right now. SPAR in Switzerland uses OpenCryptoPay, a fixed QR at the checkout, scan and you're done in seconds. Here's why it works: it meets shoppers in the wallet they already have, and the hard parts, the rate, the chain, the settlement risk, are handled server-side so the buyer never sees them. That's the engineering win, and it's live, not a slide.",
"sDE":"Und das ist echt, das läuft gerade. SPAR in der Schweiz nutzt OpenCryptoPay, fester QR an der Kasse, scannen und in Sekunden fertig. Und so funktioniert's: es holt die Leute in der Wallet ab, die sie eh haben, und die harten Teile, Kurs, Chain, Settlement-Risiko, laufen serverseitig, sodass der Käufer sie nie sieht. Das ist der Engineering-Gewinn, und er ist live, keine Folie."},

{"t":"So which is it?","oEN":"Frame both sides of the debate and set up the red team.","oDE":"Beide Seiten rahmen und das Red Team aufsetzen.",
"sEN":"So, which is it? On the left, the optimistic read: it's a bridge that meets people where they are, real checkout, works with old wallets, and honestly, we've always paid for usable money with some trust, exchanges, banks, all of it. On the right, the honest cost: you depend on the operator for the rate, the settlement, and the privacy of who paid. A real dependency, the same one every payment rail carries, and the bet is that good engineering makes it worth it. In a minute, you're going to argue both sides.",
"sDE":"Also, was ist es? Links die optimistische Lesart: eine Brücke, die Leute dort abholt, wo sie sind, echter Checkout, läuft mit alten Wallets, und ehrlich, wir haben benutzbares Geld immer mit ein bisschen Vertrauen bezahlt, Börsen, Banken, alles. Rechts der ehrliche Preis: ihr hängt vom Betreiber ab für Kurs, Settlement und die Privatsphäre, wer gezahlt hat. Eine echte Abhängigkeit, dieselbe, die jede Zahlungsschiene hat, und die Wette ist, dass gutes Engineering es wert macht. Gleich argumentiert ihr beide Seiten."},

{"t":"Break the trust model","oEN":"FACILITATION: launch the pairs exercise clearly. 15 min.","oDE":"MODERATION: die Paar-Übung klar starten. 15 Min.",
"sEN":"Pairs, fifteen minutes. Find me either the strongest attack, or the objection that just kills the whole thing. Doesn't need a slide, one minute of making your case is plenty. I'll take the best one, defend it as hard as I can, and then try to tear it apart. Off you go.",
"sDE":"In Paaren, fünfzehn Minuten. Findet mir entweder den stärksten Angriff, oder den Einwand, der das Ganze einfach kippt. Braucht keine Folie, eine Minute, in der ihr euren Fall macht, reicht völlig. Ich nehm den besten, verteidige ihn so hart ich kann, und versuch ihn dann auseinanderzunehmen. Los geht's."},

{"t":"Where to attack, pick one","oEN":"Give angles so no pair is stuck; keep energy high.","oDE":"Blickwinkel geben, damit kein Paar feststeckt.",
"sEN":"If you're staring at a blank page, just pick an angle. The check that's optional and client-side. The signature we never verified. The fact that the server logs everyone's payments. How you'd bind the rate across chains so nobody has to trust it. Who holds value between scan and settle, and how you'd shrink that window. Or phishing that domain-tied login. Pick one and really dig in.",
"sDE":"Wenn ihr auf ein leeres Blatt starrt, nehmt einfach einen Blickwinkel. Die Prüfung, die optional und im Client ist. Die Signatur, die wir nie verifiziert haben. Dass der Server die Zahlungen von allen mitschreibt. Wie ihr den Kurs über Chains hinweg bindet, sodass ihm niemand vertrauen muss. Wer zwischen Scan und Settlement den Wert hält, und wie ihr dieses Fenster verkleinert. Oder dieses domain-gebundene Login phishen. Nehmt eins und grabt euch richtig rein."},

{"t":"My honest take","oEN":"Give an honest, opinionated synthesis; invite disagreement.","oDE":"Ehrliche, klare Meinung; Widerspruch einladen.",
"sEN":"Okay, my honest opinion, and feel free to push back. LNURL is genuinely the biggest UX win Lightning ever had, it won for a reason. The hash binding is solid, when wallets actually bother to do it. And to be precise, not breathless: at the till, settlement is custodial and the asset that moves may not be BTC. That's a deliberate UX trade, and a good standard names it openly. The open part, binding the rate and settlement trustlessly across chains, nobody's fully solved yet, and that's exactly the kind of thing some of you could go and build.",
"sDE":"Okay, meine ehrliche Meinung, und widersprecht ruhig. LNURL ist wirklich der größte UX-Gewinn, den Lightning je hatte, das hat aus gutem Grund gewonnen. Das Hash-Binding ist solide, wenn Wallets sich denn die Mühe machen. Und um präzise zu sein, nicht atemlos: an der Kasse ist das Settlement custodial, und das, was sich bewegt, ist nicht unbedingt BTC. Das ist ein bewusster UX-Tausch, und ein guter Standard benennt das offen. Der offene Teil, Kurs und Settlement trustless über Chains zu binden, hat noch keiner ganz gelöst, und genau das könnten ein paar von euch bauen."},

{"t":"Take it home","oEN":"Give three concrete things to do after the session.","oDE":"Drei konkrete Dinge für danach mitgeben.",
"sEN":"Three things to take with you. One, point your own wallet at your spoof merchant and see if it actually catches the lie, or if it would've just paid. Two, add a successAction link and turn it into a phishing page, then ask yourself whose job it is to clean that up. Three, try to design something that locks down the OCP price the same way the hash locks down the description. It's all in the hands-on folder.",
"sDE":"Drei Sachen für den Weg. Erstens, richtet eure eigene Wallet auf euren Spoof-Merchant und schaut, ob sie die Lüge wirklich fängt, oder ob sie einfach gezahlt hätte. Zweitens, baut einen successAction-Link ein und macht 'ne Phishing-Seite draus, und dann fragt euch, wessen Job es ist, das aufzuräumen. Drittens, versucht was zu entwerfen, das den OCP-Preis genauso festnagelt wie der Hash die Beschreibung. Ist alles im hands-on-Ordner."},

{"t":"It is just the web, almost all the way down","oEN":"Land the thesis and close warmly.","oDE":"Die These landen und warm abschließen.",
"sEN":"So, where was the Bitcoin? Turns out, mostly that one thin layer at the bottom. The magic was never really magic, and the trust was there the whole time, you just couldn't see it. Now you can, and you get to decide what you build on top of it. Thanks, everyone.",
"sDE":"Also, wo war das Bitcoin? Wie sich rausstellt, meistens diese eine dünne Schicht ganz unten. Die Magie war nie wirklich Magie, und das Vertrauen war die ganze Zeit da, ihr habt's nur nicht gesehen. Jetzt schon, und ihr entscheidet, was ihr darauf baut. Danke euch."}
]
</script>

<script>
const NOTES=JSON.parse(document.getElementById('data').textContent);
const wrap=document.getElementById('wrap');
const N=NOTES.length;
document.getElementById('tot').textContent=N;document.getElementById('tot2').textContent=N;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}
NOTES.forEach((c,i)=>{
  const next=NOTES[i+1];
  const el=document.createElement('div');el.className='card';el.id='c'+(i+1);
  el.innerHTML=`
    <div class="eyebrow">Slide ${i+1} / ${N}</div>
    <h2>${esc(c.t)}</h2>
    <div class="block outcome"><div class="h">🎯 Outcome / Ziel</div>
      <div class="two">
        <div><div class="lang">EN</div><div class="say">${esc(c.oEN)}</div></div>
        <div><div class="lang">DE</div><div class="say">${esc(c.oDE)}</div></div>
      </div></div>
    <div class="block"><div class="h">🗣 Say · English</div><div class="say">${esc(c.sEN)}</div></div>
    <div class="block"><div class="h">🗣 Sagen · Deutsch</div><div class="say">${esc(c.sDE)}</div></div>
    ${next?`<div class="peek">NEXT → <b>${i+2}. ${esc(next.t)}</b></div>`:`<div class="peek">END OF DECK</div>`}
  `;
  wrap.appendChild(el);
});

let cur=1;
function render(){
  document.querySelectorAll('.card').forEach((el,i)=>el.style.display=(i===cur-1)?'block':'none');
  document.getElementById('num').textContent=cur;
  document.getElementById('num2').textContent=cur;
  document.getElementById('ttl').textContent=NOTES[cur-1].t;
  window.scrollTo(0,0);
  if(history.replaceState)history.replaceState(null,'','#'+cur);
}
function go(n){cur=Math.max(1,Math.min(N,n));render()}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(cur+1)}
  if(e.key==='ArrowLeft'){e.preventDefault();go(cur-1)}
  if(e.key==='Home')go(1);if(e.key==='End')go(N);
  if(e.key==='p'||e.key==='P'){document.querySelectorAll('.card').forEach(el=>el.style.display='block')}
});
/* swipe on phone */
let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.changedTouches[0].clientX;sy=e.changedTouches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){go(cur+(dx<0?1:-1))}
},{passive:true});
go(parseInt(location.hash.slice(1))||1);
</script>
</body>
</html>
